<template id="ambient-bg-template">
  <div
    data-composition-id="ambient-bg"
    data-start="0"
    data-width="1080"
    data-height="1920"
    data-duration="73.4"
  >
    <div class="amb-root">
      <div class="amb-base"></div>
      <div class="amb-grid" id="amb-grid"></div>
      <div class="amb-particles">
        <div class="amb-dot" style="left: 14%; top: 12%;"></div>
        <div class="amb-dot" style="left: 78%; top: 8%;"></div>
        <div class="amb-dot" style="left: 42%; top: 28%;"></div>
        <div class="amb-dot" style="left: 88%; top: 48%;"></div>
        <div class="amb-dot" style="left: 9%; top: 64%;"></div>
        <div class="amb-dot" style="left: 66%; top: 74%;"></div>
        <div class="amb-dot" style="left: 28%; top: 84%;"></div>
        <div class="amb-dot" style="left: 72%; top: 22%;"></div>
      </div>
      <div class="amb-vignette"></div>
    </div>

    <style>
      [data-composition-id="ambient-bg"] {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }
      [data-composition-id="ambient-bg"] .amb-root {
        position: absolute;
        inset: 0;
        overflow: hidden;
      }
      [data-composition-id="ambient-bg"] .amb-base {
        position: absolute;
        inset: 0;
        background: radial-gradient(
          ellipse 80% 60% at 50% 30%,
          #1a1228 0%,
          #110d1e 45%,
          #0a0815 80%,
          #060410 100%
        );
      }
      [data-composition-id="ambient-bg"] .amb-grid {
        position: absolute;
        inset: -40px;
        background-image:
          linear-gradient(rgba(180, 130, 255, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(180, 130, 255, 0.04) 1px, transparent 1px);
        background-size: 80px 80px;
        opacity: 0.7;
        will-change: transform;
      }
      [data-composition-id="ambient-bg"] .amb-particles {
        position: absolute;
        inset: 0;
      }
      [data-composition-id="ambient-bg"] .amb-dot {
        position: absolute;
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: #c084fc;
        box-shadow: 0 0 10px rgba(192, 132, 252, 0.7);
        opacity: 0.5;
        will-change: transform, opacity;
      }
      [data-composition-id="ambient-bg"] .amb-vignette {
        position: absolute;
        inset: 0;
        background: radial-gradient(
          ellipse 100% 80% at 50% 50%,
          transparent 50%,
          rgba(4, 3, 10, 0.5) 82%,
          rgba(4, 3, 10, 0.85) 100%
        );
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        var tl = gsap.timeline({ paused: true });
        var TOTAL = 73.4;
        var GRID_CYCLE = 14;

        tl.to('[data-composition-id="ambient-bg"] #amb-grid', {
          x: -80,
          y: -80,
          duration: GRID_CYCLE,
          ease: "none",
          repeat: Math.max(Math.floor(TOTAL / GRID_CYCLE) - 1, 0),
        }, 0);

        var dots = document.querySelectorAll('[data-composition-id="ambient-bg"] .amb-dot');
        dots.forEach(function (dot, i) {
          var dx = 38 + (i % 3) * 12;
          var dy = 28 + ((i + 1) % 3) * 10;
          var dur = 9 + (i % 4) * 1.4;
          var cycles = Math.max(Math.floor(TOTAL / (dur * 2)), 1);
          tl.to(dot, {
            x: dx, y: -dy,
            duration: dur,
            ease: "sine.inOut",
            yoyo: true,
            repeat: cycles * 2 - 1,
          }, 0);
          var opDur = dur * 0.55;
          var opCycles = Math.max(Math.floor(TOTAL / (opDur * 2)), 1);
          tl.to(dot, {
            opacity: 0.9,
            duration: opDur,
            ease: "sine.inOut",
            yoyo: true,
            repeat: opCycles * 2 - 1,
          }, 0);
        });

        tl.set({}, {}, TOTAL);
        window.__timelines = window.__timelines || {};
        window.__timelines["ambient-bg"] = tl;
      })();
    </script>
  </div>
</template>
