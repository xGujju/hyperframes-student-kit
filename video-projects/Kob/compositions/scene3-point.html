<template id="scene3-point-template">
  <div
    data-composition-id="scene3-point"
    data-start="0"
    data-width="1080"
    data-height="1920"
    data-duration="10.70"
  >
    <!-- Fullscreen overlay — used with FULLSCREEN face mode -->
    <div class="s3-wrap" id="s3-wrap">
      <div class="s3-glow" id="s3-glow"></div>
      <div class="s3-kicker" id="s3-kicker">กฎข้อที่ 1</div>
      <div class="s3-big" id="s3-big">3 ไม้/วัน</div>
      <div class="s3-sub" id="s3-sub">จำกัดตัวเองเท่านั้น</div>
      <div class="s3-pills" id="s3-pills">
        <div class="s3-pill s3-won" id="s3-p1">✓ ได้</div>
        <div class="s3-divp">แค่</div>
        <div class="s3-pill s3-lost" id="s3-p2">✕ เสีย</div>
        <div class="s3-divp">ก็</div>
        <div class="s3-pill s3-stop" id="s3-p3">พับจอ</div>
      </div>
    </div>

    <style>
      [data-composition-id="scene3-point"] { position: absolute; inset: 0; }
      [data-composition-id="scene3-point"] .s3-wrap {
        position: absolute; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 20px;
        background: rgba(6, 4, 16, 0.6);
      }
      [data-composition-id="scene3-point"] .s3-glow {
        position: absolute; width: 700px; height: 700px; border-radius: 50%;
        background: radial-gradient(circle, rgba(192,132,252,0.12) 0%, transparent 70%);
        top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
        pointer-events: none;
      }
      [data-composition-id="scene3-point"] .s3-kicker {
        font-family: "Sarabun", sans-serif; font-weight: 400;
        font-size: 44px; letter-spacing: 0.22em; color: #c084fc;
        text-transform: uppercase; opacity: 0; transform: translateY(-18px);
      }
      [data-composition-id="scene3-point"] .s3-big {
        font-family: "Kanit", sans-serif; font-weight: 900;
        font-size: 220px; line-height: 0.88; letter-spacing: -0.03em; text-align: center;
        background: linear-gradient(135deg, #fff 20%, #c084fc 55%, #818cf8 100%);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        background-clip: text; filter: drop-shadow(0 0 50px rgba(192,132,252,0.35));
        opacity: 0; transform: scale(0.82);
      }
      [data-composition-id="scene3-point"] .s3-sub {
        font-family: "Sarabun", sans-serif; font-weight: 500; font-size: 44px;
        color: rgba(255,255,255,0.7); letter-spacing: 0.04em;
        opacity: 0; transform: translateY(14px);
      }
      [data-composition-id="scene3-point"] .s3-pills {
        display: flex; align-items: center; gap: 16px; margin-top: 10px;
        opacity: 0;
      }
      [data-composition-id="scene3-point"] .s3-pill {
        font-family: "Kanit", sans-serif; font-weight: 700; font-size: 36px;
        border-radius: 100px; padding: 10px 28px; letter-spacing: 0.04em;
      }
      [data-composition-id="scene3-point"] .s3-won {
        background: rgba(74,222,128,0.15); border: 1px solid rgba(74,222,128,0.5); color: #4ade80;
      }
      [data-composition-id="scene3-point"] .s3-lost {
        background: rgba(248,113,113,0.15); border: 1px solid rgba(248,113,113,0.5); color: #f87171;
      }
      [data-composition-id="scene3-point"] .s3-stop {
        background: rgba(192,132,252,0.15); border: 1px solid rgba(192,132,252,0.5); color: #c084fc;
      }
      [data-composition-id="scene3-point"] .s3-divp {
        font-family: "Sarabun", sans-serif; font-size: 32px; color: rgba(255,255,255,0.5);
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        var tl = gsap.timeline({ paused: true });
        var s = '[data-composition-id="scene3-point"] ';
        tl.to(s + "#s3-glow",  { scale: 1, duration: 0.7, ease: "power2.out" }, 0.1);
        tl.to(s + "#s3-kicker",{ opacity: 1, y: 0, duration: 0.35, ease: "power3.out" }, 0.2);
        tl.to(s + "#s3-big",   { opacity: 1, scale: 1, duration: 0.55, ease: "back.out(1.6)" }, 0.45);
        tl.to(s + "#s3-sub",   { opacity: 1, y: 0, duration: 0.38, ease: "power2.out" }, 0.85);
        tl.to(s + "#s3-pills", { opacity: 1, duration: 0.4, ease: "power2.out" }, 3.5);
        // Glow pulse
        var cycles = Math.ceil(10.70 / 2.4);
        tl.to(s + "#s3-glow", { scale: 1.3, opacity: 0.7, duration: 1.2, ease: "sine.inOut", yoyo: true, repeat: cycles * 2 - 1 }, 1.0);
        tl.set({}, {}, 10.70);
        window.__timelines = window.__timelines || {};
        window.__timelines["scene3-point"] = tl;
      })();
    </script>
  </div>
</template>
