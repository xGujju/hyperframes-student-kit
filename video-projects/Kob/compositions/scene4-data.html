    data-start="0"
    data-width="1080"
    data-height="1920"
    data-duration="12.46"
  >
    <div class="s4-panel">
      <div class="s4-label" id="s4-label">กฎข้อที่ 2</div>

      <div class="s4-rule" id="s4-rule">

      <div class="s4-why" id="s4-why">

    <style>
      [data-composition-id="scene4-data"] { position: absolute; inset: 0; }
      [data-composition-id="scene4-data"] .s4-panel {
        position: absolute; top: 0; left: 0;
        width: 1080px; height: 960px;
        display: flex; flex-direction: column; justify-content: center;
        padding: 60px 80px; gap: 22px; box-sizing: border-box; overflow: hidden;
      }
      [data-composition-id="scene4-data"] .s4-label {
        font-family: "Kanit", sans-serif; font-weight: 400; font-size: 34px;
        letter-spacing: 0.22em; color: #c084fc; text-transform: uppercase; opacity: 0;
      }
      [data-composition-id="scene4-data"] .s4-rule {
        display: flex; align-items: baseline; gap: 14px; opacity: 0; transform: translateY(30px);
      }
      [data-composition-id="scene4-data"] .s4-num {
        font-family: "Kanit", sans-serif; font-weight: 900; font-size: 200px; line-height: 0.88;
        background: linear-gradient(135deg, #fff 20%, #c084fc 70%);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        filter: drop-shadow(0 0 30px rgba(192,132,252,0.3));
      }
      [data-composition-id="scene4-data"] .s4-unit {
        font-family: "Kanit", sans-serif; font-weight: 700; font-size: 72px;
        color: rgba(255,255,255,0.85);
      }
      [data-composition-id="scene4-data"] .s4-desc {
        font-family: "Sarabun", sans-serif; font-weight: 600; font-size: 44px;
        line-height: 1.4; color: rgba(255,255,255,0.85); opacity: 0; transform: translateY(16px);
      }
      [data-composition-id="scene4-data"] .s4-divider {
        height: 2px; width: 0; background: linear-gradient(90deg, #c084fc, transparent); border-radius: 2px;
      }
      [data-composition-id="scene4-data"] .s4-why {
        display: flex; align-items: flex-start; gap: 18px; opacity: 0; transform: translateX(-20px);
      }
      [data-composition-id="scene4-data"] .s4-why-icon {
        font-size: 44px; color: #fb923c; flex-shrink: 0;
        filter: drop-shadow(0 0 10px rgba(251,146,60,0.6));
      }
      [data-composition-id="scene4-data"] .s4-why-text {
        font-family: "Sarabun", sans-serif; font-weight: 600; font-size: 40px;
        line-height: 1.4; color: rgba(255,255,255,0.8);
      }
      [data-composition-id="scene4-data"] .s4-timer-wrap { opacity: 0; }
      [data-composition-id="scene4-data"] .s4-timer-label {

      }
      [data-composition-id="scene4-data"] .s4-timer-track {
        height: 8px; background: rgba(255,255,255,0.08); border-radius: 4px; overflow: hidden;
      }
      [data-composition-id="scene4-data"] .s4-timer-bar {
        height: 100%; width: 100%; border-radius: 4px;
        background: linear-gradient(90deg, #c084fc, #38bdf8);

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        var tl = gsap.timeline({ paused: true });
        var s = '[data-composition-id="scene4-data"] ';
        tl.to(s + ".s4-label", { opacity: 1, duration: 0.35, ease: "power2.out" }, 0.1);
        tl.to(s + ".s4-rule",  { opacity: 1, y: 0, duration: 0.5, ease: "back.out(1.4)" }, 0.3);
        tl.to(s + ".s4-desc",  { opacity: 1, y: 0, duration: 0.4, ease: "power2.out" }, 0.7);
        tl.to(s + "#s4-div",   { width: 260, duration: 0.4, ease: "power2.out" }, 1.1);
        tl.to(s + ".s4-why",   { opacity: 1, x: 0, duration: 0.4, ease: "power3.out" }, 4.0);
        tl.to(s + ".s4-timer-wrap", { opacity: 1, duration: 0.3, ease: "power2.out" }, 6.0);
        // Timer drains over remaining ~6s to show cooldown visually
        tl.to(s + "#s4-tbar", { scaleX: 0, duration: 6.0, ease: "none" }, 6.1);
        tl.set({}, {}, 12.46);
        window.__timelines = window.__timelines || {};
        window.__timelines["scene4-data"] = tl;
      })();
    </script>

</template>
