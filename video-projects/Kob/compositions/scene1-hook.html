<template id="scene1-hook-template">
  <div
    data-composition-id="scene1-hook"
    data-start="0"
    data-width="1080"
    data-height="1920"
    data-duration="7.82"
  >
    <div class="s1-panel">
      <!-- Warning tag -->
      <div class="s1-tag" id="s1-tag">
        <div class="s1-tag-dot"></div>
        <span>⚠ ดูด่วน!</span>
      </div>

      <!-- BTC hook headline -->
      <div class="s1-hl">
        <div class="s1-word" id="s1-w1">เทรด BTC</div>
        <div class="s1-word s1-red" id="s1-w2">แล้วขาดทุน?</div>
      </div>

      <!-- Sub line -->
      <div class="s1-sub" id="s1-sub">
        <div class="s1-sub-bar" id="s1-bar"></div>
        <span class="s1-sub-text">ถ้าไม่อยากหมดตัว</span>
      </div>
    </div>

    <style>
      [data-composition-id="scene1-hook"] { position: absolute; inset: 0; }
      [data-composition-id="scene1-hook"] .s1-panel {
        position: absolute; top: 0; left: 0;
        width: 1080px; height: 960px;
        display: flex; flex-direction: column;
        align-items: flex-start; justify-content: center;
        padding: 80px; gap: 32px; box-sizing: border-box; overflow: hidden;
      }
      [data-composition-id="scene1-hook"] .s1-tag {
        display: flex; align-items: center; gap: 12px;
        background: rgba(239,68,68,0.15);
        border: 1px solid rgba(239,68,68,0.5);
        border-radius: 100px; padding: 10px 26px;
        font-family: "Sarabun", sans-serif; font-weight: 700; font-size: 34px;
        color: #f87171; letter-spacing: 0.04em;
        opacity: 0; transform: translateX(-20px);
      }
      [data-composition-id="scene1-hook"] .s1-tag-dot {
        width: 10px; height: 10px; border-radius: 50%;
        background: #f87171; box-shadow: 0 0 10px rgba(248,113,113,0.9);
      }
      [data-composition-id="scene1-hook"] .s1-hl {
        display: flex; flex-direction: column; gap: 4px;
      }
      [data-composition-id="scene1-hook"] .s1-word {
        font-family: "Kanit", sans-serif; font-weight: 900;
        font-size: 136px; line-height: 0.95; letter-spacing: -0.02em;
        background: linear-gradient(180deg, #fff 0%, #ccc 100%);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        background-clip: text; opacity: 0; transform: translateY(45px);
      }
      [data-composition-id="scene1-hook"] .s1-red {
        background: linear-gradient(135deg, #f87171 0%, #fb923c 100%);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        background-clip: text; filter: drop-shadow(0 0 18px rgba(248,113,113,0.45));
      }
      [data-composition-id="scene1-hook"] .s1-sub {
        display: flex; align-items: center; gap: 18px; opacity: 0;
      }
      [data-composition-id="scene1-hook"] .s1-sub-bar {
        width: 0; height: 4px;
        background: linear-gradient(90deg, #f87171, #c084fc);
        border-radius: 2px; box-shadow: 0 0 10px rgba(248,113,113,0.6);
      }
      [data-composition-id="scene1-hook"] .s1-sub-text {
        font-family: "Sarabun", sans-serif; font-weight: 700; font-size: 46px;
        color: rgba(255,255,255,0.8);
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        var tl = gsap.timeline({ paused: true });
        var s = '[data-composition-id="scene1-hook"] ';
        tl.to(s + "#s1-tag", { opacity: 1, x: 0, duration: 0.4, ease: "power3.out" }, 0.1);
        tl.to(s + "#s1-w1",  { opacity: 1, y: 0, duration: 0.38, ease: "expo.out" }, 0.45);
        tl.to(s + "#s1-w2",  { opacity: 1, y: 0, duration: 0.4,  ease: "back.out(1.5)" }, 0.72);
        tl.to(s + "#s1-sub", { opacity: 1, duration: 0.3, ease: "power2.out" }, 1.2);
        tl.to(s + "#s1-bar", { width: 56, duration: 0.4, ease: "power3.out" }, 1.28);
        tl.set({}, {}, 7.82);
        window.__timelines = window.__timelines || {};
        window.__timelines["scene1-hook"] = tl;
      })();
    </script>
  </div>
</template>
